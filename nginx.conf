# ============================================================
# chrislll-blog Nginx 配置
# 适用环境：阿里云 ECS + Nginx + 阿里云免费 SSL
# 放置位置：/etc/nginx/conf.d/chrislll-blog.conf
# ============================================================

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name chrislll.cn www.chrislll.cn;
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name chrislll.cn www.chrislll.cn;

    # SSL 证书（阿里云免费 SSL，下载 Nginx 格式后上传到服务器）
    ssl_certificate     /etc/nginx/ssl/chrislll.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/chrislll.cn.key;

    # SSL 安全参数
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Nuxt 静态资源（长期缓存）
    location /_nuxt/ {
        alias /www/wwwroot/chrislll-blog/blog-web/.output/public/_nuxt/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip_static on;
        try_files $uri =404;
    }

    # 上传图片（由 Nginx 直接提供静态文件）
    location /uploads/ {
        alias /www/wwwroot/chrislll-blog/blog-api/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # API 请求 -> Express 后端（端口 3000）
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        # 文件上传大小限制（与 multer 配置对应，5MB 上传 + 余量）
        client_max_body_size 10m;
    }

    # 其余所有请求 -> Nuxt SSR 前端（端口 3001）
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # 访问日志
    access_log /var/log/nginx/chrislll-blog.access.log;
    error_log  /var/log/nginx/chrislll-blog.error.log;
}
